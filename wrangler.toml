# Cloudflare Workers static-assets config for the Finjaro SPA.
# `npx wrangler deploy` (the project's deploy command) uploads ./dist and
# serves it as a single-page app: unknown routes fall back to index.html so
# client-side routing works and deep links don't return a white screen.
name = "henribeaubayemi"
compatibility_date = "2026-07-23"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
