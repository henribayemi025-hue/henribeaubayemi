name: Deploy to Netlify

# Deploys the production build to Netlify from GitHub's runners (which have
# network egress), avoiding any local/CI proxy restrictions.
# Requires ONE repository secret: NETLIFY_AUTH_TOKEN
#   (Netlify → User settings → Applications → Personal access tokens → New token)
# The site id below is not sensitive.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: netlify-deploy
  cancel-in-progress: true

env:
  NETLIFY_SITE_ID: 7239e5ca-25b6-4b75-88c4-2adcf02a2d94

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://bokwivwizghdlaedczbw.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_UMnuj2_xJ7uZt76TspkBAA_EiAMg6zt
          # VAPID application server (public) key for Web Push. Public by design.
          VITE_VAPID_PUBLIC_KEY: BMd-k0e9sRisx9rduYzSe9TWZx64zvpqjMlIhJP9NtPnsp_fjDxkHKCs17J9emm1NJcd3J3z8pkVGJjx4W6392A
      - name: Guard — require deploy token
        run: |
          if [ -z "${{ secrets.NETLIFY_AUTH_TOKEN }}" ]; then
            echo "::error::NETLIFY_AUTH_TOKEN secret is not set. Add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
      - name: Deploy to Netlify (production)
        run: npx --yes netlify-cli@17 deploy --prod --dir=dist --site="$NETLIFY_SITE_ID" --message "Deploy ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
